<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BabyGearMatchmaker</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lato:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #FFF9F5; font-family: 'Lato', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px 16px 48px; }
    .header { text-align: center; margin-bottom: 24px; }
    .logo { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 900; color: #1A1A2E; }
    .logo span { color: #FF6B6B; }
    .tagline { font-size: 11px; color: #8E8E9A; margin-top: 3px; letter-spacing: 1px; text-transform: uppercase; }
    .card { background: #fff; border-radius: 20px; border: 1.5px solid #FFE4D0; padding: 32px 28px; max-width: 500px; width: 100%; box-shadow: 0 8px 40px rgba(255,107,107,0.08); }
    .progress-bar-wrap { width: 100%; max-width: 500px; margin-bottom: 18px; }
    .progress-meta { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 6px; }
    .progress-track { height: 6px; background: #FFE4D0; border-radius: 99px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 99px; transition: width 0.3s; }
    .chips { display: flex; gap: 5px; margin-top: 10px; flex-wrap: wrap; }
    .chip { font-size: 11px; padding: 3px 9px; border-radius: 99px; font-weight: 700; }
    .question { font-family: 'Playfair Display', serif; font-size: 19px; font-weight: 700; color: #1A1A2E; margin-bottom: 18px; line-height: 1.35; }
    .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 22px; }
    .option { border: 2px solid #FFE4D0; border-radius: 12px; padding: 11px 15px; cursor: pointer; background: #fff; transition: all 0.15s; }
    .option:hover { border-color: #FF6B6B; background: #FFF0E8; }
    .option.selected { border-color: #FF6B6B; background: rgba(255,107,107,0.07); }
    .option-label { font-size: 14px; font-weight: 700; color: #1A1A2E; }
    .option-desc { font-size: 12px; color: #8E8E9A; margin-top: 2px; }
    .btn { border: none; border-radius: 12px; padding: 13px; font-size: 15px; font-weight: 700; cursor: pointer; width: 100%; transition: all 0.2s; }
    .btn-primary { background: linear-gradient(135deg, #FF6B6B, #FFB347); color: #fff; box-shadow: 0 4px 20px rgba(255,107,107,0.25); }
    .btn-outline { background: transparent; color: #FF6B6B; border: 2px solid #FF6B6B; }
    .btn:disabled { background: #FFE4D0; color: #8E8E9A; cursor: not-allowed; box-shadow: none; }
    .result-section { margin-bottom: 22px; }
    .result-title { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 700; margin-bottom: 10px; padding-bottom: 6px; }
    .result-item { padding-left: 12px; margin-bottom: 14px; }
    .result-item-label { font-size: 11px; font-weight: 700; color: #8E8E9A; text-transform: uppercase; letter-spacing: 0.5px; }
    .result-item-name { font-size: 14px; font-weight: 700; color: #1A1A2E; margin-top: 2px; }
    .result-item-price { font-size: 12px; font-weight: 700; margin-top: 1px; }
    .result-item-why { font-size: 13px; color: #8E8E9A; line-height: 1.6; margin-top: 3px; }
    .view-btn { display: inline-block; margin-top: 6px; font-size: 12px; font-weight: 700; border: 1.5px solid; border-radius: 8px; padding: 4px 10px; text-decoration: none; }
    .secret-box { background: #F0F7FF; border: 1.5px solid #C7DEFF; border-radius: 12px; padding: 16px; margin-bottom: 24px; }
    .loading-wrap { text-align: center; padding: 20px 0; }
    .loading-icon { font-size: 44px; display: inline-block; animation: spin 3s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .loading-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 900; color: #1A1A2E; margin: 12px 0 8px; }
    .loading-msg { font-size: 14px; color: #8E8E9A; margin-bottom: 20px; min-height: 24px; }
    .loading-note { font-size: 12px; color: #8E8E9A; background: #FFF0E8; border-radius: 10px; padding: 10px 14px; line-height: 1.7; }
    .footer { font-size: 11px; color: #8E8E9A; margin-top: 18px; text-align: center; }
    .intro-icon { font-size: 48px; margin-bottom: 14px; }
    .intro-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 900; color: #1A1A2E; line-height: 1.25; margin-bottom: 12px; }
    .intro-desc { font-size: 14px; color: #8E8E9A; line-height: 1.7; margin-bottom: 10px; }
    .info-box { font-size: 12px; background: #F0F7FF; border: 1px solid #C7DEFF; border-radius: 10px; padding: 10px 14px; color: #2255CC; margin-bottom: 18px; line-height: 1.6; }
    .results-header { text-align: center; margin-bottom: 22px; }
    .skip-item { border-left: 3px solid #ddd; padding-left: 12px; margin-bottom: 10px; font-size: 13px; color: #1A1A2E; line-height: 1.6; }
    .api-key-note { font-size: 12px; color: #FF6B6B; background: #FFF0E8; border: 1px solid #FFE4D0; border-radius: 10px; padding: 10px 14px; margin-bottom: 16px; line-height: 1.6; display: none; }
  </style>
</head>

<div class="card" id="mainCard">

  ]},
  {id:"soother_space",section:"soother",q:"How much space can your soother take up?",opts:[

    {v:"moderate",l:"🏠 Moderate is fine",d:"I have some room"},
    {v:"no_limit",l:"🛋️ Size doesn't matter",d:"I just want what works best"},
  ]},
  {id:"carry_style",section:"carrying",q:"How often will you wear baby?",opts:[

    {v:"active",l:"🏃 Active / hiking",d:"Need structured support"},

  ]},
  {id:"carry_preference",section:"carrying",q:"Any carrier preference?",opts:[
    {v:"wrap",l:"🧣 Soft wrap",d:"Very snug, steep learning curve"},
    {v:"structured",l:"🎒 Structured carrier",d:"Buckles, easy on/off"},
    {v:"ring_sling",l:"💍 Ring sling",d:"Minimal, one-shoulder"},
    {v:"no_pref",l:"🤷 No preference",d:"Recommend what's best"},
  ]},
];

const LOADING_MSGS = [
  "🔍 Searching BabyGearLab for top picks...",
  "📖 Reading parent reviews on Reddit...",
  "💰 Checking current prices...",
  "🏆 Comparing specs across brands...",
  "🛡️ Verifying safety ratings...",
  "✨ Building your personalized match...",
];

// ── STATE ─────────────────────────────────────────────────────────────────────
let screen = "intro";
let qIndex = 0;
let answers = {};
let selected = null;
let results = null;
let loadingInterval = null;
let loadingMsgIndex = 0;

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  const card = document.getElementById("mainCard");
  const progressWrap = document.getElementById("progressWrap");

  if (screen === "quiz") {
    progressWrap.style.display = "block";
    updateProgress();
  } else {
    progressWrap.style.display = "none";
  }

  if (screen === "intro") card.innerHTML = renderIntro();
  else if (screen === "quiz") card.innerHTML = renderQuiz();
  else if (screen === "loading") card.innerHTML = renderLoading();
  else if (screen === "results") card.innerHTML = renderResults();
  else if (screen === "error") card.innerHTML = renderError();

  attachListeners();
}

function updateProgress() {
  const q = QUESTIONS[qIndex];
  const color = SECTION_COLORS[q.section];
  const sec = SECTIONS.find(s => s.id === q.section);
  const sqs = QUESTIONS.filter(x => x.section === q.section);
  const idx = sqs.findIndex(x => x.id === q.id) + 1;
  const pct = (qIndex / QUESTIONS.length) * 100;

  document.getElementById("sectionLabel").textContent = `${sec.label} · ${idx} of ${sqs.length}`;
  document.getElementById("sectionLabel").style.color = color;
  document.getElementById("qCounter").textContent = `${qIndex + 1} / ${QUESTIONS.length}`;
  document.getElementById("progressFill").style.width = pct + "%";
  document.getElementById("progressFill").style.background = `linear-gradient(90deg, ${color}, #FFB347)`;

  const chipsEl = document.getElementById("sectionChips");
  chipsEl.innerHTML = SECTIONS.map(s => {
    const firstI = QUESTIONS.findIndex(x => x.section === s.id);
    const sqs2 = QUESTIONS.filter(x => x.section === s.id);
    const done = qIndex >= firstI + sqs2.length;
    const active = q.section === s.id;
    const c = done || active ? SECTION_COLORS[s.id] : "#aaa";
    return `<span class="chip" style="background:${c}20;color:${c}">${s.label}</span>`;
  }).join("");
}

function renderIntro() {
  const chips = SECTIONS.map(s => `<span class="chip" style="background:${SECTION_COLORS[s.id]}18;color:${SECTION_COLORS[s.id]}">${s.label}</span>`).join("");
  return `
    <div style="text-align:center">
      <div class="intro-icon">🎯</div>
      <div class="intro-title">Find your perfect baby gear match</div>
      <div class="intro-desc">Answer ${QUESTIONS.length} questions across 7 categories and get a fully personalized gear list — searched live across the web for your exact profile.</div>
      <div class="info-box">🔍 Powered by live web search — current prices, real reviews, up-to-date picks</div>
      <div class="chips" style="justify-content:center;margin-bottom:24px">${chips}</div>
      ${ANTHROPIC_API_KEY === "YOUR_API_KEY_HERE" ? '<div class="api-key-note" style="display:block">⚠️ Add your Anthropic API key in the HTML file to enable AI-powered results.</div>' : ""}
      <button class="btn btn-primary" onclick="startQuiz()">Start My Match →</button>
    </div>`;
}

function renderQuiz() {
  const q = QUESTIONS[qIndex];
  const color = SECTION_COLORS[q.section];
  const isLast = qIndex + 1 === QUESTIONS.length;
  const opts = q.opts.map(o => `
    <div class="option ${selected === o.v ? 'selected' : ''}" onclick="selectOption('${o.v}')" style="${selected === o.v ? `border-color:${color};background:${color}12` : ''}">
      <div class="option-label">${o.l}</div>
      <div class="option-desc">${o.d}</div>
    </div>`).join("");
  return `
    <div class="question">${q.q}</div>
    <div class="options">${opts}</div>
    <button class="btn" id="nextBtn" onclick="nextQuestion()" ${!selected ? 'disabled' : ''} style="${selected ? `background:linear-gradient(135deg,${color},#FFB347);color:#fff` : ''}">
      ${isLast ? "Search & Match Me ✨" : "Next →"}
    </button>`;
}

function renderLoading() {
  return `
    <div class="loading-wrap">
      <div class="loading-icon">🔍</div>
      <div class="loading-title">Searching the web for you...</div>
      <div class="loading-msg" id="loadingMsg">${LOADING_MSGS[0]}</div>
      <div class="loading-note">This takes 15–30 seconds while Claude searches<br>BabyGearLab, Reddit, brand sites & more</div>
    </div>`;
}

function renderResults() {
  if (!results) return "";
  const date = new Date().toLocaleDateString();

  function section(title, color, items) {
    if (!items || items.length === 0) return "";
    const rows = items.map(item => `
      <div class="result-item" style="border-left:3px solid ${color}">
        ${item.label ? `<div class="result-item-label">${item.label}</div>` : ""}
        <div class="result-item-name">${item.name}</div>
        ${item.price ? `<div class="result-item-price" style="color:${color}">${item.price}</div>` : ""}
        <div class="result-item-why">${item.why}</div>
        ${item.url && item.url !== "#" ? `<a href="${item.url}" target="_blank" class="view-btn" style="color:${color};border-color:${color};background:${color}0d">View Product →</a>` : ""}
      </div>`).join("");
    return `<div class="result-section">
      <div class="result-title" style="color:${color};border-bottom:2px solid ${color}33">${title}</div>
      ${rows}
    </div>`;
  }

  const skips = (results.skips || []).map(s => `<div class="skip-item">${s}</div>`).join("");

  return `
    <div class="results-header">
      <div style="font-size:36px">🎉</div>
      <div style="font-family:'Playfair Display',serif;font-size:21px;font-weight:900;color:#1A1A2E;margin-top:8px">Your Gear Match is Ready!</div>
      <div style="font-size:12px;color:#8E8E9A;margin-top:4px">Based on live web research · ${date}</div>
    </div>
    ${section("🚼 Stroller","#9B59B6", results.stroller ? [{label:"Top Pick",...results.stroller}] : [])}
    ${section("🚗 Car Seat","#2255CC", results.carseats)}
    ${section("😴 Sleep","#2AAF74", results.sleep)}
    ${section("🍼 Feeding","#E67E22", results.feeding)}
    ${results.soothers && results.soothers.length ? section("🎠 Soother","#00897B", results.soothers) : ""}
    ${section("🤱 Carrier","#E91E8C", results.carriers)}
    ${skips ? `<div class="result-section">
      <div class="result-title" style="color:#FF6B6B;border-bottom:2px solid #FF6B6B33">❌ Skip These</div>
      ${skips}
    </div>` : ""}
    ${results.secret ? `<div class="secret-box">
      <div style="font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:#2255CC;margin-bottom:6px">🔑 Your Secret Weapon</div>
      <div style="font-size:14px;font-weight:700;color:#1A1A2E">${results.secret.name}</div>
      ${results.secret.price ? `<div style="font-size:12px;color:#2255CC;font-weight:700;margin-top:1px">${results.secret.price}</div>` : ""}
      <div style="font-size:13px;color:#8E8E9A;margin-top:4px;line-height:1.6">${results.secret.why}</div>
      ${results.secret.url && results.secret.url !== "#" ? `<a href="${results.secret.url}" target="_blank" class="view-btn" style="color:#2255CC;border-color:#2255CC;background:#2255CC0d">View Product →</a>` : ""}
    </div>` : ""}
    <button class="btn btn-outline" onclick="restart()">↩ Start Over</button>`;
}

function renderError() {
  return `
    <div style="text-align:center">
      <div style="font-size:40px;margin-bottom:14px">😬</div>
      <div style="font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:#1A1A2E;margin-bottom:10px">Something went wrong</div>
      <div style="font-size:13px;color:#8E8E9A;margin-bottom:20px;line-height:1.6" id="errorMsg"></div>
      <button class="btn btn-primary" onclick="restart()">Try Again</button>
    </div>`;
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function startQuiz() { screen="quiz"; qIndex=0; answers={}; selected=null; render(); }
function restart() { screen="intro"; qIndex=0; answers={}; selected=null; results=null; render(); }

function selectOption(val) {
  selected = val;
  render();
}

async function nextQuestion() {
  if (!selected) return;
  const q = QUESTIONS[qIndex];
  answers[q.id] = selected;
  selected = null;

  if (qIndex + 1 < QUESTIONS.length) {
    qIndex++;
    render();
    return;
  }

  // Last question — call API
  screen = "loading";
  render();

  let msgIdx = 0;
  loadingInterval = setInterval(() => {
    msgIdx = (msgIdx + 1) % LOADING_MSGS.length;
    const el = document.getElementById("loadingMsg");
    if (el) el.textContent = LOADING_MSGS[msgIdx];
  }, 2500);

  try {
    const res = await callClaude(answers);
    clearInterval(loadingInterval);
    results = res;
    screen = "results";
  } catch(err) {
    clearInterval(loadingInterval);
    screen = "error";
    render();
    const el = document.getElementById("errorMsg");
    if (el) el.textContent = err.message;
    return;
  }
  render();
}

async function callClaude(answers) {
  if (ANTHROPIC_API_KEY === "YOUR_API_KEY_HERE") {
    throw new Error("Please add your Anthropic API key to the HTML file.");
  }

  const prompt = buildPrompt(answers);

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": ANTHROPIC_API_KEY,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 4000,
      tools: [{ type: "web_search_20250305", name: "web_search" }],
      system: `You are BabyGearMatchmaker, an expert baby gear advisor. Search the web for current baby gear recommendations based on the parent's profile. Always search before recommending. Return ONLY a JSON object with this structure (no markdown, no preamble):
{"stroller":{"name":"...","price":"...","why":"...","url":"..."},"carseats":[{"label":"...","name":"...","price":"...","why":"...","url":"..."}],"sleep":[{"label":"...","name":"...","price":"...","why":"...","url":"..."}],"feeding":[{"label":"...","name":"...","price":"...","why":"...","url":"..."}],"soothers":[{"label":"...","name":"...","price":"...","why":"...","url":"..."}],"carriers":[{"label":"...","name":"...","price":"...","why":"...","url":"..."}],"skips":["...","...","..."],"secret":{"name":"...","price":"...","why":"...","url":"..."}}`,
      messages: [{ role: "user", content: prompt }],
    }),
  });

  const data = await response.json();
  if (!response.ok) throw new Error(`API Error ${response.status}: ${JSON.stringify(data)}`);

  const textBlock = data.content?.filter(b => b.type === "text").pop();
  if (!textBlock?.text) throw new Error("No response from Claude");

  const clean = textBlock.text.replace(/```json|```/g, "").trim();
  return JSON.parse(clean);
}

function buildPrompt(a) {
  return `Find the best current baby gear for this parent profile and return as JSON:
- Lifestyle: ${a.lifestyle}
- Budget: ${a.budget}
- Home: ${a.home}
- Children: ${a.babies}
- Stroller priority: ${a.stroller_priority}, terrain: ${a.stroller_terrain}, extras: ${a.stroller_extras}
- Baby age: ${a.baby_age}, car type: ${a.car_size}, rotating seat: ${a.rotation}, installs: ${a.seat_installs}
- Sleep: ${a.sleep_setup}, priority: ${a.sleep_priority}
- Feeding: ${a.feeding_plan}, highchair: ${a.highchair_style}, solids: ${a.solid_foods}
- Soother: ${a.soother_type}, space: ${a.soother_space}
- Carrier: ${a.carry_style}, preference: ${a.carry_preference}`;
}

function attachListeners() {}

// ── INIT ──────────────────────────────────────────────────────────────────────
render();
</script>
